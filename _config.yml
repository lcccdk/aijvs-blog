# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: AIJVS
subtitle: 免费开源的深度学习和 AI 学习网站，让每个人都参与到 AI！
description: AIJVS - 免费开源的深度学习和 AI 学习平台，提供高质量的 AI 教程、深度学习资源和实践项目
keywords: AI, 人工智能，深度学习，机器学习，神经网络，教程，开源，免费
author: AIJVS Team
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://aijvs.com
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'date'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: butterfly

# Deployment
deploy:
  type: ''

# Local Search
searchdb:
  path: search.xml
  field: post
  content: true
  format: html

# Sitemap
sitemap:
  path: sitemap.xml

# Baidu Sitemap
baidusitemap:
  path: baidusitemap.xml
